name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - name: Tag must match package.json version
        run: |
          pkg="v$(node -p "require('./package.json').version")"
          if [ "$pkg" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json ($pkg)" && exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      # No npm token: auth goes through npm Trusted Publishing (OIDC) — the workflow
      # identity (repo evgentus-cy/visual-feedback, file release.yml) is registered as a
      # trusted publisher on npmjs.com. The OIDC exchange needs npm >= 11.5.1; the runner's
      # bundled npm 10 fails with ENEEDAUTH, so upgrade first. prepublishOnly runs the build.
      - run: npm install -g npm@latest
      - run: npm publish --access public --provenance
